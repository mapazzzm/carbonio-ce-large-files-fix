# Snippet for nginx.conf.web.https.template and nginx.conf.web.https.default.template
# Insert these 4 location blocks BEFORE the existing `location /services/files/`.
#
# Three blocks (upload-chunked, upload, public-link download) share the same
# auth gate (redirect to /static/login/ if ZM_AUTH_TOKEN cookie is missing) and
# use `proxy_pass http://host:port/path;` with a URI suffix — nginx replaces
# the matched location prefix with that suffix, so no rewrite is needed.
#
# The 4th block stubs out /services/storages/quota/myself. Carbonio CE doesn't
# implement it (Java returns 403 + console errors); we reply with a fake
# "unlimited" payload so the UI is happy.

    location = /services/storages/quota/myself {
        default_type application/json;
        return 200 '{"used":0,"limit":-1}';
    }

    location ^~ /services/files/upload-chunked
    {
        set $AUTH_COOKIE_MISSING 0;
        if ($http_cookie !~ "ZM_AUTH_TOKEN=") {
            set $AUTH_COOKIE_MISSING 1;
        }
        if ( $AUTH_COOKIE_MISSING = 1) {
            return 307 "/static/login/";
        }
        proxy_request_buffering off;
        proxy_read_timeout      7200;
        proxy_send_timeout      7200;
        client_body_timeout     7200;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_pass              http://127.0.0.1:5795/upload-chunked;
    }

    location ^~ /services/files/upload
    {
        set $AUTH_COOKIE_MISSING 0;
        if ($http_cookie !~ "ZM_AUTH_TOKEN=") {
            set $AUTH_COOKIE_MISSING 1;
        }
        if ( $AUTH_COOKIE_MISSING = 1) {
            return 307 "/static/login/";
        }
        proxy_request_buffering off;
        proxy_read_timeout      3600;
        proxy_send_timeout      3600;
        client_body_timeout     3600;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_pass              http://127.78.0.2:10000/upload;
    }

    location ^~ /services/files/public/link/download/ {
        proxy_request_buffering off;
        proxy_read_timeout      7200;
        proxy_send_timeout      7200;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_pass              http://127.0.0.1:5795/public-download/;
    }

    location ^~ /services/files/download/ {
        set $AUTH_COOKIE_MISSING 0;
        if ($http_cookie !~ "ZM_AUTH_TOKEN=") {
            set $AUTH_COOKIE_MISSING 1;
        }
        if ( $AUTH_COOKIE_MISSING = 1) {
            return 307 "/static/login/";
        }
        proxy_request_buffering off;
        proxy_read_timeout      7200;
        proxy_send_timeout      7200;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        Cookie $http_cookie;
        proxy_pass              http://127.0.0.1:5795/ui-download/;
    }
